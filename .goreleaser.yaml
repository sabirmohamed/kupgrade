# Minimal GoReleaser config — curl install only
version: 2

builds:
  - main: ./cmd/kupgrade
    binary: kupgrade
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/sabirmohamed/kupgrade/internal/cli.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: sabirmohamed
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/sabirmohamed/kupgrade"
    description: "Real-time terminal dashboard for Kubernetes node upgrades"
    license: "Apache-2.0"
    install: |
      bin.install "kupgrade"
    test: |
      system "#{bin}/kupgrade", "--help"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\(.+\))?\!?:.+$'
      order: 2
    - title: Other
      order: 999

release:
  draft: false
  prerelease: auto
  header: |
    **Real-time terminal dashboard for Kubernetes node upgrades.**

    Nodes, pods, PDB blockers, drain progress, events, and before/after comparison — one terminal.
    Works on AKS, EKS, GKE, and any Kubernetes cluster.

    ### Install

    **Homebrew:**
    ```bash
    brew install sabirmohamed/tap/kupgrade
    ```

    **curl:**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/sabirmohamed/kupgrade/main/install.sh | bash
    ```

    Then run `kupgrade watch`
